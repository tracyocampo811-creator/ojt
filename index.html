<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>150-Hour Tracker</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid #ddd; }
        h2 { color: #2c3e50; margin-top: 0; }
        .progress-container { background: #eee; border-radius: 20px; height: 25px; width: 100%; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: #27ae60; height: 100%; width: 0%; transition: width 0.3s; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2980b9; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #3498db; }
        .history { margin-top: 20px; max-height: 150px; overflow-y: auto; font-size: 0.9rem; }
        .history-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>Hour Tracker</h2>
    <div class="stats">
        <div class="stat-box"><strong>Total:</strong> <br><span id="total-done">0</span> / 150</div>
        <div class="stat-box"><strong>Remaining:</strong> <br><span id="remaining">150</span></div>
    </div>

    <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <input type="number" id="hours-input" placeholder="Enter hours (e.g. 4.5)" step="0.1">
    <button onclick="addHours()">Add Record</button>
    <button onclick="resetData()" style="background:#e74c3c; margin-top: 5px; font-size: 0.7rem;">Reset All</button>

    <div class="history" id="history-log"></div>
</div>

<script>
    let totalGoal = 150;
    let records = JSON.parse(localStorage.getItem('hourLogs')) || [];

    function updateUI() {
        let sum = records.reduce((a, b) => a + b.amount, 0);
        document.getElementById('total-done').innerText = sum.toFixed(1);
        document.getElementById('remaining').innerText = Math.max(0, (totalGoal - sum)).toFixed(1);
        
        let percentage = (sum / totalGoal) * 100;
        document.getElementById('progress-bar').style.width = Math.min(percentage, 100) + "%";

        let logHTML = "";
        records.slice().reverse().forEach(item => {
            logHTML += `<div class="history-item"><span>${item.date}</span> <strong>${item.amount} hrs</strong></div>`;
        });
        document.getElementById('history-log').innerHTML = logHTML;
    }

    function addHours() {
        let val = parseFloat(document.getElementById('hours-input').value);
        if (isNaN(val) || val <= 0) return;
        
        records.push({ amount: val, date: new Date().toLocaleDateString() });
        localStorage.setItem('hourLogs', JSON.stringify(records));
        document.getElementById('hours-input').value = "";
        updateUI();
    }

    function resetData() {
        if(confirm("Are you sure you want to clear all records?")) {
            records = [];
            localStorage.removeItem('hourLogs');
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
