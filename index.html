<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>150-Hour OJT Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #ebf5fb; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #d4e6f1; }
        .stat-card span { display: block; font-size: 1.4rem; font-weight: bold; color: #2980b9; }

        .progress-container { background: #eee; border-radius: 20px; height: 15px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: #27ae60; height: 100%; width: 0%; transition: width 0.5s ease; }

        .input-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        .form-row { margin-bottom: 12px; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: bold; color: #7f8c8d; margin-bottom: 4px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2980b9; }

        .projection-alert { background: #fef9e7; border-left: 5px solid #f1c40f; padding: 12px; border-radius: 4px; font-size: 0.9rem; margin-bottom: 20px; line-height: 1.4; }
        
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .history-table th { text-align: left; padding: 8px; background: #f2f2f2; border-bottom: 2px solid #ddd; }
        .history-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .history-container { max-height: 250px; overflow-y: auto; }
        
        .clear-btn { background: #e74c3c; font-size: 0.75rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>OJT Hour Tracker</h2>

    <div class="summary-grid">
        <div class="stat-card">Total Done <span id="total-val">0</span></div>
        <div class="stat-card">Remaining <span id="remaining-val">150</span></div>
    </div>

    <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div class="projection-alert" id="finish-prediction">
        Enter logs to calculate your estimated finish date.
    </div>

    <div class="input-section">
        <div class="form-row">
            <label>Work Date</label>
            <input type="date" id="work-date">
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div class="form-row" style="flex:1">
                <label>Time In</label>
                <input type="time" id="time-in">
            </div>
            <div class="form-row" style="flex:1">
                <label>Time Out</label>
                <input type="time" id="time-out">
            </div>
        </div>
        <button onclick="addLog()">Log Work Hours</button>
    </div>

    <div class="history-container">
        <table class="history-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Shift</th>
                    <th>Net (Hrs)</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <button onclick="resetData()" class="clear-btn">Clear All Records</button>
</div>

<script>
    const GOAL_HOURS = 150;
    const DAILY_TARGET = 4; // Updated to 4 hours per day
    let logs = JSON.parse(localStorage.getItem('ojt_tracker_v2')) || [];

    document.getElementById('work-date').valueAsDate = new Date();

    function calculateProjectedDate(remaining) {
        if (remaining <= 0) return "Requirement Met!";
        
        // Calculate work days needed based on 4 hours/day
        let workDaysNeeded = Math.ceil(remaining / DAILY_TARGET);
        let current = new Date();
        let added = 0;

        while (added < workDaysNeeded) {
            current.setDate(current.getDate() + 1);
            // Skip Sat (6) and Sun (0)
            if (current.getDay() !== 0 && current.getDay() !== 6) {
                added++;
            }
        }
        return `<strong>Estimated Completion (4hrs/day):</strong><br>${current.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
    }

    function updateDisplay() {
        let total = logs.reduce((sum, item) => sum + item.hours, 0);
        let remaining = Math.max(0, GOAL_HOURS - total);

        document.getElementById('total-val').innerText = total;
        document.getElementById('remaining-val').innerText = remaining;
        document.getElementById('progress-bar').style.width = Math.min((total / GOAL_HOURS) * 100, 100) + "%";
        document.getElementById('finish-prediction').innerHTML = calculateProjectedDate(remaining);

        let body = document.getElementById('log-body');
        body.innerHTML = "";
        logs.slice().reverse().forEach((log) => {
            let row = `<tr>
                <td>${log.date}</td>
                <td>${log.in} - ${log.out}</td>
                <td><strong>${log.hours}</strong></td>
            </tr>`;
            body.innerHTML += row;
        });
    }

    function addLog() {
        let dateVal = document.getElementById('work-date').value;
        let tIn = document.getElementById('time-in').value;
        let tOut = document.getElementById('time-out').value;

        if (!dateVal || !tIn || !tOut) return alert("Please fill in all fields.");

        let start = new Date(`2000-01-01 ${tIn}`);
        let end = new Date(`2000-01-01 ${tOut}`);
        
        let diffMs = end - start;
        if (diffMs <= 0) return alert("Time Out must be later than Time In.");

        let grossHours = diffMs / (1000 * 60 * 60);
        
        // Use Math.floor to get the whole number without rounding up
        // Deduct 1 hour for lunch, then floor the result
        let netHours = Math.floor(grossHours - 1);
        if (netHours < 0) netHours = 0;

        logs.push({
            date: dateVal,
            in: tIn,
            out: tOut,
            hours: netHours
        });

        localStorage.setItem('ojt_tracker_v2', JSON.stringify(logs));
        updateDisplay();
        
        document.getElementById('time-in').value = "";
        document.getElementById('time-out').value = "";
    }

    function resetData() {
        if (confirm("This will permanently delete your logs. Continue?")) {
            logs = [];
            localStorage.removeItem('ojt_tracker_v2');
            updateDisplay();
        }
    }

    updateDisplay();
</script>

</body>
</html>
